<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fintrack — Controle Financeiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
:root {
  --bg:       #07090F;
  --s1:       #0D1117;
  --s2:       #131920;
  --s3:       #1C2433;
  --border:   rgba(255,255,255,.07);
  --border2:  rgba(255,255,255,.12);
  --teal:     #00C896;
  --teal-dim: rgba(0,200,150,.12);
  --teal-glow:rgba(0,200,150,.25);
  --red:      #FF5E5E;
  --red-dim:  rgba(255,94,94,.12);
  --yellow:   #FFB547;
  --yel-dim:  rgba(255,181,71,.12);
  --blue:     #4D9CFF;
  --blue-dim: rgba(77,156,255,.12);
  --purple:   #A78BFA;
  --pur-dim:  rgba(167,139,250,.12);
  --t1: #F0F4F8;
  --t2: #8892A4;
  --t3: #4A5568;
  --r:  14px;
  --r2: 10px;
  --r3: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--t1);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ===== SCROLLBAR ===== */
@keyframes loadpulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 10px; }


/* ===== MATERIAL ICONS ===== */
.mi {
  font-family: 'Material Symbols Rounded';
  font-weight: normal;
  font-style: normal;
  font-size: 20px;
  line-height: 1;
  letter-spacing: normal;
  text-transform: none;
  display: inline-block;
  white-space: nowrap;
  word-wrap: normal;
  direction: ltr;
  -webkit-font-smoothing: antialiased;
  font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
}
.sb-icon { font-size: 18px !important; }
.sb-icon .mi { font-size: 18px; }

/* ===== AUTH SCREENS ===== */
.auth-screen {
  display: none;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow: hidden;
}
